name: restaurant_management
description: "Restaurant Management System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  provider: ^6.1.0
  shared_preferences: ^2.2.0
  google_fonts: ^6.2.0
  intl: any
  easy_localization: any
  flutter_animate: any
  flutter_localizations:
    sdk: flutter
  qr_flutter: ^4.1.0
  pdf: ^3.12.0
  printing: ^5.14.3
  universal_html: ^2.3.0
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/translations/
